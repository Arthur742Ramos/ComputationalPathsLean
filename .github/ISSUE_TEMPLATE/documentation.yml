name: Documentation issue
description: Report unclear, stale, or missing repository documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Which README, docs page, paper note, or metadata file needs attention?
      placeholder: "docs/README.md"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What should change?
      description: Describe what is unclear, stale, missing, or inconsistent.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or direction
      description: Optional concise fix, link, or cross-reference.
